<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>APP-CSE Importer — Municipality of Balayan</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',sans-serif;background:#0d1117;color:#e6edf3;min-height:100vh;padding:32px 20px;}
.container{max-width:860px;margin:0 auto;}
h1{font-size:26px;font-weight:700;margin-bottom:4px;color:#3fb950;}
.sub{font-size:13px;color:#8b949e;margin-bottom:28px;}
.card{background:#161b22;border:1px solid #30363d;border-radius:12px;padding:24px;margin-bottom:20px;}
.card-title{font-size:15px;font-weight:700;margin-bottom:16px;color:#e6edf3;display:flex;align-items:center;gap:8px;}
.drop-zone{border:2px dashed #30363d;border-radius:8px;padding:40px;text-align:center;cursor:pointer;transition:border-color .2s,background .2s;}
.drop-zone:hover,.drop-zone.over{border-color:#3fb950;background:rgba(46,160,67,.05);}
.drop-zone-icon{font-size:40px;margin-bottom:12px;}
.drop-zone-text{font-size:14px;color:#8b949e;}
.drop-zone-text strong{color:#3fb950;}
#file-input{display:none;}
.btn{display:inline-flex;align-items:center;gap:6px;border:none;border-radius:8px;padding:10px 20px;font-size:14px;font-weight:600;cursor:pointer;transition:all .15s;}
.btn-primary{background:#2ea043;color:#fff;}
.btn-primary:hover{background:#238636;}
.btn-primary:disabled{background:#21262d;color:#484f58;cursor:not-allowed;}
.btn-danger{background:rgba(248,81,73,.1);color:#f85149;border:1px solid rgba(248,81,73,.2);}
.preview-table{width:100%;border-collapse:collapse;font-size:12px;margin-top:12px;}
.preview-table th{background:#1c2333;padding:8px 12px;text-align:left;font-size:11px;font-weight:600;color:#8b949e;letter-spacing:.5px;text-transform:uppercase;border-bottom:1px solid #30363d;}
.preview-table td{padding:8px 12px;border-bottom:1px solid #21262d;vertical-align:middle;}
.preview-table tbody tr:last-child td{border-bottom:none;}
.badge{display:inline-flex;align-items:center;padding:1px 8px;border-radius:20px;font-size:10px;font-weight:600;}
.badge-green{background:rgba(63,185,80,.12);color:#3fb950;border:1px solid rgba(63,185,80,.2);}
.badge-red{background:rgba(248,81,73,.12);color:#f85149;border:1px solid rgba(248,81,73,.2);}
.badge-blue{background:rgba(88,166,255,.12);color:#58a6ff;border:1px solid rgba(88,166,255,.2);}
.badge-gray{background:#21262d;color:#8b949e;border:1px solid #30363d;}
.badge-amber{background:rgba(240,165,0,.12);color:#f0a500;border:1px solid rgba(240,165,0,.2);}
.progress-bar{height:8px;background:#21262d;border-radius:4px;overflow:hidden;margin:10px 0;}
.progress-fill{height:100%;background:#2ea043;border-radius:4px;transition:width .3s;}
.log{background:#0d1117;border:1px solid #21262d;border-radius:8px;padding:14px;font-family:monospace;font-size:12px;max-height:200px;overflow-y:auto;margin-top:12px;}
.log-line{margin-bottom:4px;}
.log-ok{color:#3fb950;}
.log-err{color:#f85149;}
.log-info{color:#8b949e;}
.summary{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:16px;}
.sum-box{background:#0d1117;border:1px solid #30363d;border-radius:8px;padding:14px;text-align:center;}
.sum-num{font-size:28px;font-weight:700;color:#3fb950;}
.sum-label{font-size:11px;color:#8b949e;margin-top:2px;text-transform:uppercase;letter-spacing:.4px;}
select,input[type=text]{background:#1c2333;border:1px solid #30363d;border-radius:6px;padding:6px 10px;color:#e6edf3;font-size:13px;outline:none;}
select:focus,input[type=text]:focus{border-color:#3fb950;}
.step{display:flex;align-items:center;gap:10px;margin-bottom:10px;font-size:13px;color:#8b949e;}
.step-num{width:24px;height:24px;border-radius:50%;background:#1c2333;border:1px solid #30363d;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;}
.step-num.done{background:#238636;border-color:#2ea043;color:#fff;}
</style>
</head>
<body>
<div class="container">
  <h1>📋 APP-CSE Excel Importer</h1>
  <p class="sub">Import Annual Procurement Plan data from Excel (.xlsm/.xlsx) directly to Firestore</p>

  <!-- STEP 1: Upload -->
  <div class="card">
    <div class="card-title"><span id="step1-num" class="step-num">1</span> Upload Excel File</div>
    <div class="drop-zone" id="drop-zone" onclick="document.getElementById('file-input').click()" ondragover="dragOver(event)" ondragleave="dragLeave(event)" ondrop="dropFile(event)">
      <div class="drop-zone-icon">📂</div>
      <div class="drop-zone-text"><strong>Click to browse</strong> or drag & drop your .xlsm / .xlsx file here</div>
      <div class="drop-zone-text" id="file-name" style="margin-top:8px;color:#3fb950"></div>
    </div>
    <input type="file" id="file-input" accept=".xlsm,.xlsx,.xls" onchange="handleFile(this.files[0])">
  </div>

  <!-- STEP 2: Preview -->
  <div class="card" id="preview-card" style="display:none">
    <div class="card-title"><span id="step2-num" class="step-num">2</span> Preview Data</div>
    <div class="summary" id="summary"></div>
    <div style="overflow-x:auto;max-height:340px;overflow-y:auto;border:1px solid #30363d;border-radius:8px;">
      <table class="preview-table" id="preview-table"></table>
    </div>
  </div>

  <!-- STEP 3: Import -->
  <div class="card" id="import-card" style="display:none">
    <div class="card-title"><span id="step3-num" class="step-num">3</span> Import to Firestore</div>
    <p style="font-size:13px;color:#8b949e;margin-bottom:16px;">Ready to import <strong id="import-count" style="color:#e6edf3"></strong> records into the <code style="background:#1c2333;padding:2px 6px;border-radius:4px;color:#3fb950">procurement_items</code> collection.</p>
    <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;">
      <button class="btn btn-primary" id="import-btn" onclick="startImport()">🚀 Import to Firebase</button>
      <button class="btn btn-danger" id="clear-btn" onclick="clearData()" style="display:none">🗑 Clear All & Re-import</button>
      <span id="import-status" style="font-size:13px;color:#8b949e"></span>
    </div>
    <div class="progress-bar" id="progress-bar" style="display:none"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
    <div class="log" id="log" style="display:none"></div>
  </div>
</div>

<!-- Firebase SDK -->
<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, writeBatch } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';

const firebaseConfig = {
  apiKey:     "AIzaSyCmoO3iEpR1R4GzHK2Z21YfCVV9_VRoMJo",
  authDomain: "vehicle-maintenance-syst-4fb2e.firebaseapp.com",
  projectId:  "vehicle-maintenance-syst-4fb2e",
  appId:      "1:513108103014:web:7ade19f5a6e6bb3e7f42a7",
};

const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);
const col = () => collection(db, 'procurement_items');

window._fb = { db, col, addDoc, getDocs, deleteDoc, doc, writeBatch, collection };
</script>

<script>
// ── Sheet name → dept + type mapping ──
const SHEET_MAP = {
  'GSO':                { dept:'GSO',  type:'CSE' },
  'GSO Other Supplies': { dept:'GSO',  type:'Other Supplies' },
  'GSO Machinery':      { dept:'GSO',  type:'Machinery' },
  'ICT':                { dept:'ICT',  type:'CSE' },
  'ICT Other Supplies': { dept:'ICT',  type:'Other Supplies' },
  'ICT Machinery':      { dept:'ICT',  type:'Machinery' },
  'MPDC':               { dept:'MPDC', type:'CSE' },
  'MPDC Other Supplies':{ dept:'MPDC', type:'Other Supplies' },
  'MPDC Machinery':     { dept:'MPDC', type:'Machinery' },
  'PESO':               { dept:'PESO', type:'CSE' },
  'PESO Other Supplies':{ dept:'PESO', type:'Other Supplies' },
  'PESO Machinery':     { dept:'PESO', type:'Machinery' },
  'MHO':                { dept:'MHO',  type:'CSE' },
  'MHO Other Supplies': { dept:'MHO',  type:'Other Supplies' },
  'MHO Machinery':      { dept:'MHO',  type:'Machinery' },
  'HRMO':               { dept:'HRMO', type:'CSE' },
  'HRMO Other Supplies':{ dept:'HRMO', type:'Other Supplies' },
  'HRMO Machinery':     { dept:'HRMO', type:'Machinery' },
};

let parsedRows = [];

function dragOver(e){ e.preventDefault(); document.getElementById('drop-zone').classList.add('over'); }
function dragLeave(e){ document.getElementById('drop-zone').classList.remove('over'); }
function dropFile(e){ e.preventDefault(); dragLeave(e); handleFile(e.dataTransfer.files[0]); }

function handleFile(file){
  if(!file) return;
  document.getElementById('file-name').textContent=`📄 ${file.name}`;
  document.getElementById('step1-num').classList.add('done');
  const reader=new FileReader();
  reader.onload=function(e){
    const wb=XLSX.read(e.target.result,{type:'array',cellDates:true});
    parsedRows=[];
    Object.entries(SHEET_MAP).forEach(([sheetName,meta])=>{
      const ws=wb.Sheets[sheetName];
      if(!ws) return;
      const rows=XLSX.utils.sheet_to_json(ws,{defval:''});
      rows.forEach(row=>{
        const item=(row['ITEM']||'').toString().trim();
        if(!item) return;
        const unitPrice=parseFloat(row['UNIT PRICE']||0)||0;
        const qty=parseFloat(row['QUANTITY']||0)||0;
        parsedRows.push({
          item,
          department: meta.dept,
          type: meta.type,
          unit_of_measure: (row['UNIT OF MEASURE']||'').toString().trim(),
          month: (row['MONTH']||'').toString().trim(),
          unit_price: unitPrice.toFixed(2),
          quantity: qty.toString(),
          total_amount: (unitPrice*qty).toFixed(2),
          availability: (row['AVAILABILITY']||'').toString().trim()||'Available',
        });
      });
    });
    showPreview();
  };
  reader.readAsArrayBuffer(file);
}

function showPreview(){
  const byDept={}, byType={}, byAvail={};
  parsedRows.forEach(r=>{
    byDept[r.department]=(byDept[r.department]||0)+1;
    byType[r.type]=(byType[r.type]||0)+1;
    byAvail[r.availability]=(byAvail[r.availability]||0)+1;
  });

  document.getElementById('summary').innerHTML=`
    <div class="sum-box"><div class="sum-num">${parsedRows.length}</div><div class="sum-label">Total Records</div></div>
    <div class="sum-box"><div class="sum-num">${Object.keys(byDept).length}</div><div class="sum-label">Departments</div></div>
    <div class="sum-box"><div class="sum-num">${Object.keys(byType).length}</div><div class="sum-label">Types</div></div>`;

  const thead=`<thead><tr><th>#</th><th>Item</th><th>Dept</th><th>Type</th><th>Month</th><th>Unit Price</th><th>Qty</th><th>Total</th><th>Status</th></tr></thead>`;
  const tbody=parsedRows.slice(0,50).map((r,i)=>`<tr>
    <td style="color:#484f58">${i+1}</td>
    <td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${r.item}</td>
    <td><span class="badge badge-gray">${r.department}</span></td>
    <td><span class="badge ${r.type==='CSE'?'badge-blue':r.type==='Machinery'?'badge-amber':'badge-gray'}">${r.type}</span></td>
    <td style="color:#8b949e">${r.month}</td>
    <td style="font-family:monospace;color:#f0a500">₱${parseFloat(r.unit_price).toLocaleString('en-PH',{minimumFractionDigits:2})}</td>
    <td style="color:#8b949e">${r.quantity}</td>
    <td style="font-family:monospace;color:#3fb950">₱${parseFloat(r.total_amount).toLocaleString('en-PH',{minimumFractionDigits:2})}</td>
    <td><span class="badge ${r.availability.toLowerCase().includes('not')?'badge-red':'badge-green'}">${r.availability}</span></td>
  </tr>`).join('');
  const more=parsedRows.length>50?`<tr><td colspan="9" style="text-align:center;color:#8b949e;padding:10px">... and ${parsedRows.length-50} more records</td></tr>`:'';
  document.getElementById('preview-table').innerHTML=thead+`<tbody>${tbody}${more}</tbody>`;

  document.getElementById('preview-card').style.display='block';
  document.getElementById('import-card').style.display='block';
  document.getElementById('import-count').textContent=parsedRows.length;
  document.getElementById('step2-num').classList.add('done');
  document.getElementById('preview-card').scrollIntoView({behavior:'smooth'});
}

async function startImport(){
  if(!window._fb){ alert('Firebase not loaded yet. Please wait.'); return; }
  const { db, col, addDoc, writeBatch, collection, doc } = window._fb;
  const btn=document.getElementById('import-btn');
  btn.disabled=true;
  btn.textContent='Importing…';
  document.getElementById('progress-bar').style.display='block';
  document.getElementById('log').style.display='block';

  const log=document.getElementById('log');
  const logLine=(msg,cls='log-info')=>{ log.innerHTML+=`<div class="log-line ${cls}">${msg}</div>`; log.scrollTop=log.scrollHeight; };

  logLine(`⏳ Starting import of ${parsedRows.length} records...`);

  let done=0, errors=0;
  // Use batches of 499 (Firestore batch limit is 500)
  const BATCH_SIZE=499;
  for(let i=0;i<parsedRows.length;i+=BATCH_SIZE){
    const batch=writeBatch(db);
    const chunk=parsedRows.slice(i,i+BATCH_SIZE);
    chunk.forEach(row=>{ const ref=doc(collection(db,'procurement_items')); batch.set(ref,row); });
    try{
      await batch.commit();
      done+=chunk.length;
      const pct=Math.round(done/parsedRows.length*100);
      document.getElementById('progress-fill').style.width=pct+'%';
      logLine(`✅ Batch ${Math.floor(i/BATCH_SIZE)+1}: imported ${chunk.length} records (${done}/${parsedRows.length})`, 'log-ok');
    } catch(e){
      errors++;
      logLine(`❌ Batch error: ${e.message}`, 'log-err');
    }
  }

  const msg=errors===0
    ? `✅ Done! ${done} records imported successfully.`
    : `⚠️ Done with ${errors} batch error(s). ${done} records imported.`;
  logLine(msg, errors===0?'log-ok':'log-err');
  document.getElementById('import-status').textContent=msg;
  document.getElementById('step3-num').classList.add('done');
  btn.textContent='✅ Import Complete';
  document.getElementById('clear-btn').style.display='inline-flex';
}

async function clearData(){
  if(!window._fb){ alert('Firebase not ready.'); return; }
  if(!confirm('This will DELETE ALL records in procurement_items. Are you sure?')) return;
  const { db, getDocs, deleteDoc, doc, collection, writeBatch } = window._fb;
  document.getElementById('import-status').textContent='Clearing…';
  const snap=await getDocs(collection(db,'procurement_items'));
  const BATCH_SIZE=499;
  const docs=[...snap.docs];
  for(let i=0;i<docs.length;i+=BATCH_SIZE){
    const batch=writeBatch(db);
    docs.slice(i,i+BATCH_SIZE).forEach(d=>batch.delete(d.ref));
    await batch.commit();
  }
  document.getElementById('import-status').textContent=`Cleared ${docs.length} records. Re-upload your file to import again.`;
  document.getElementById('import-btn').disabled=false;
  document.getElementById('import-btn').textContent='🚀 Import to Firebase';
  document.getElementById('clear-btn').style.display='none';
  document.getElementById('progress-fill').style.width='0%';
  document.getElementById('log').innerHTML='';
}
</script>
</body>
</html>
